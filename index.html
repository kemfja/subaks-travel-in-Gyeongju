<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUBAK'S TRAVEL IN Gyeongju</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

        .no-scrollbar::-webkit-scrollbar { display: none; }

            border-radius: 12px;

        }
        .custom-popup .leaflet-popup-content {
            margin: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-white shadow-sm flex flex-col lg:flex-row items-center justify-between px-6 py-3 z-10 relative shrink-0 gap-3">
        <!-- Left: Title -->
        <div class="w-full lg:w-1/4 text-center lg:text-left">
            <h1 class="text-xl font-extrabold text-gray-800 tracking-tight">🍉 SUBAK'S 경주 나들이</h1>
        </div>
        
        <!-- Center: Toggles -->
        <div class="flex bg-gray-100 p-1 rounded-lg w-auto shrink-0">
            <button id="btn-map" class="bg-white shadow-sm px-5 py-1.5 rounded-md text-sm font-bold text-gray-800 transition-all">지도</button>
            <button id="btn-list" class="px-5 py-1.5 rounded-md text-sm text-gray-500 font-medium hover:text-gray-800 transition-all">리스트</button>
            <div class="w-px bg-gray-300 mx-1 my-1"></div>
            <button id="btn-add-marker" class="px-4 py-1.5 rounded-md text-sm text-blue-600 font-bold hover:bg-blue-50 transition-all flex items-center gap-1">➕ 직접 추가</button>
        </div>

        <!-- Right: Filters (Compact) -->
        <div class="w-full lg:w-auto flex flex-nowrap overflow-x-auto no-scrollbar gap-1.5 text-xs font-medium pb-1 lg:pb-0 justify-start lg:justify-end shrink-0">
            <button class="filter-btn px-2.5 py-1 rounded-md border transition-all flex items-center shrink-0 cursor-pointer" data-type="all" data-active-bg="bg-gray-800" data-active-border="border-gray-800" data-active-text="text-white">
                전체
            </button>
            <button class="filter-btn px-2.5 py-1 rounded-md border transition-all flex items-center gap-1 shrink-0 cursor-pointer" data-type="tour" data-active-bg="bg-blue-50" data-active-border="border-blue-200" data-active-text="text-blue-800">
                <span class="w-2 h-2 rounded-full bg-blue-500"></span> 관광지
            </button>
            <button class="filter-btn px-2.5 py-1 rounded-md border transition-all flex items-center gap-1 shrink-0 cursor-pointer" data-type="food" data-active-bg="bg-red-50" data-active-border="border-red-200" data-active-text="text-red-800">
                <span class="w-2 h-2 rounded-full bg-red-500"></span> 맛집
            </button>
            <button class="filter-btn px-2.5 py-1 rounded-md border transition-all flex items-center gap-1 shrink-0 cursor-pointer" data-type="cafe" data-active-bg="bg-green-50" data-active-border="border-green-200" data-active-text="text-green-800">
                <span class="w-2 h-2 rounded-full bg-green-500"></span> 카페

            <button class="filter-btn px-2.5 py-1 rounded-md border transition-all flex items-center gap-1 shrink-0 cursor-pointer" data-type="transport" data-active-bg="bg-purple-50" data-active-border="border-purple-200" data-active-text="text-purple-800">
                <span class="w-2 h-2 rounded-full bg-purple-500"></span> 교통
            </button>
            <button class="filter-btn px-2.5 py-1 rounded-md border transition-all flex items-center gap-1 shrink-0 cursor-pointer" data-type="shop" data-active-bg="bg-orange-50" data-active-border="border-orange-200" data-active-text="text-orange-800">
                <span class="w-2 h-2 rounded-full bg-orange-500"></span> 소품/서점
            </button>
            <button class="filter-btn px-2.5 py-1 rounded-md border transition-all flex items-center gap-1 shrink-0 cursor-pointer" data-type="stay" data-active-bg="bg-cyan-50" data-active-border="border-cyan-200" data-active-text="text-cyan-800">
                <span class="w-2 h-2 rounded-full bg-cyan-500"></span> 숙소
            </button>

                <span class="text-yellow-400 text-sm leading-none pb-0.5">★</span> 찜
            </button>

    </header>

    <!-- Map Container -->
    <div id="map" class="flex-1 w-full relative z-10"></div>

    <!-- List Container -->
    <div id="list-view" class="hidden flex-1 w-full bg-transparent z-20 flex-col overflow-hidden h-full">
        <div class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 h-full flex flex-col min-h-0">
            <div class="bg-white shadow ring-1 ring-black ring-opacity-5 sm:rounded-lg flex-1 overflow-y-auto relative">
                <table class="min-w-full divide-y divide-gray-300 border-collapse">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="sticky top-0 z-20 bg-gray-50 bg-opacity-100 py-3.5 pl-4 pr-2 text-center text-sm font-semibold text-gray-400 sm:pl-6 w-12 border-b border-gray-200 shadow-sm whitespace-nowrap" title="즐겨찾기">★</th>
                            <th scope="col" class="sticky top-0 z-20 bg-gray-50 bg-opacity-100 px-2 py-3.5 text-center text-sm font-semibold text-gray-900 w-20 border-b border-gray-200 shadow-sm whitespace-nowrap">번호</th>
                            <th scope="col" class="sticky top-0 z-20 bg-gray-50 bg-opacity-100 px-3 py-3.5 text-left text-sm font-semibold text-gray-900 w-28 cursor-pointer hover:bg-gray-200 transition-colors sort-header select-none border-b border-gray-200 shadow-sm whitespace-nowrap" data-sort="type">구분 <span class="sort-icon text-gray-400 text-xs ml-1"></span></th>

                            <th scope="col" class="sticky top-0 z-20 bg-gray-50 bg-opacity-100 px-3 py-3.5 text-left text-sm font-semibold text-gray-900 cursor-pointer hover:bg-gray-200 transition-colors sort-header select-none border-b border-gray-200 shadow-sm whitespace-nowrap" data-sort="address">주소 <span class="sort-icon text-gray-400 text-xs ml-1"></span></th>
                            <th scope="col" class="sticky top-0 z-20 bg-gray-50 bg-opacity-100 px-3 py-3.5 text-left text-sm font-semibold text-gray-900 w-36 border-b border-gray-200 shadow-sm whitespace-nowrap">운영 시간</th>
                            <th scope="col" class="sticky top-0 z-20 bg-gray-50 bg-opacity-100 px-3 py-3.5 text-left text-sm font-semibold text-gray-900 w-28 border-b border-gray-200 shadow-sm whitespace-nowrap">휴무일</th>

                            <th scope="col" class="sticky top-0 z-20 bg-gray-50 bg-opacity-100 py-3.5 pl-2 pr-4 sm:pr-6 text-center text-sm font-semibold text-gray-900 w-32 border-b border-gray-200 shadow-sm whitespace-nowrap">네이버 이동</th>
                        </tr>

                    </tbody>

            </div>
        </div>
    </div>

    <!-- Add Marker Toast -->
    <div id="add-toast" class="fixed top-[100px] left-1/2 transform -translate-x-1/2 z-[500] bg-blue-600 text-white pl-6 pr-2 py-2 rounded-full shadow-lg text-sm font-bold hidden flex items-center justify-between gap-4 transition-all">
        <span>지도에서 위치를 클릭해주세요! 📍</span>
        <button id="btn-cancel-map-pick" class="bg-blue-800 hover:bg-blue-900 text-white text-xs px-3 py-1.5 rounded-full transition-colors cursor-pointer pointer-events-auto shrink-0 flex items-center gap-1 font-medium">돌아가기 ↩</button>
    </div>

    <!-- Add Marker Modal -->
    <div id="add-modal" class="fixed inset-0 z-[1000] hidden bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md mx-4">
            <h2 class="text-xl font-bold mb-4">새 장소 추가 📍</h2>
            
            <!-- 장소 검색 영역 -->
            <div class="mb-4 p-3 bg-gray-50 rounded-lg border border-gray-200">
                <label class="block text-sm font-medium text-gray-700 mb-1">장소 검색 (선택)</label>
                <div class="flex gap-2">
                    <input type="text" id="search-query" placeholder="예: 불국사, 첨성대" class="flex-1 w-0 border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 outline-none">
                    <button type="button" id="btn-search-place" class="px-3 py-2 text-sm font-medium text-white bg-gray-600 hover:bg-gray-700 rounded-md transition-colors whitespace-nowrap">검색</button>
                    <button type="button" id="btn-reset-search" class="px-3 py-2 text-sm font-medium text-gray-700 bg-gray-200 hover:bg-gray-300 rounded-md transition-colors whitespace-nowrap">초기화</button>
                </div>
                <!-- 검색 로딩 및 결과 안내 -->
                <div id="search-status" class="mt-2 text-xs text-blue-500 font-medium hidden"></div>
                <!-- 검색 결과 리스트 -->
                <ul id="search-results" class="mt-2 text-sm flex flex-col gap-1 max-h-32 overflow-y-auto w-full"></ul>
            </div>

            <div class="flex items-center my-4">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="flex-shrink-0 mx-4 text-gray-400 text-xs text-center leading-none mt-[-2px]">수동 정보 입력</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <!-- 이 버튼을 누르면 모달이 닫히고 지도 클릭 모드로 전환됨 -->
            <button type="button" id="btn-map-pick" class="w-full mb-4 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 rounded-md transition-colors flex items-center justify-center gap-2">
                <span>🎯 지도에서 클릭으로 위치 선택</span>
                <span id="map-pick-status" class="text-xs text-red-500 hidden">(위치 미지정)</span>
            </button>

            <form id="add-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">장소명 *</label>
                    <input type="text" id="add-name" required placeholder="예: 나만의 비밀 식당" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <input type="hidden" id="add-address" value="직접 추가한 핀 위치">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">구분 *</label>
                        <select id="add-type" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 outline-none">
                            <option value="tour">관광지</option>
                            <option value="food">맛집</option>
                            <option value="cafe">카페</option>
                            <option value="transport">교통</option>
                            <option value="shop">소품/서점</option>
                            <option value="stay">숙소</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">운영 시간</label>
                        <input type="text" id="add-hours" placeholder="예: 09:00 - 18:00" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">간단한 설명 *</label>
                    <input type="text" id="add-desc" required placeholder="경치 좋은 곳" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">휴무일</label>
                    <input type="text" id="add-closed" placeholder="예: 연중무휴" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:ring-blue-500 focus:border-blue-500 outline-none">
                </div>
                <div class="flex justify-end gap-2 mt-6">
                    <button type="button" id="btn-cancel-add" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-md transition-colors">취소</button>
                    <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors">추가하기</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirm Modal (기본 confirm 차단 우회용 커스텀 모달) -->
    <div id="delete-confirm-modal" class="fixed inset-0 z-[2000] hidden bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-sm mx-4 text-center">
            <h2 class="text-lg font-bold mb-2 text-gray-800">장소 삭제 🗑️</h2>
            <p class="text-sm text-gray-600 mb-6">추가하신 장소를 정말 삭제하시겠습니까?</p>
            <div class="flex justify-center gap-2">
                <button type="button" id="btn-cancel-delete" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-md transition-colors w-full">취소</button>
                <button type="button" id="btn-confirm-delete" class="px-4 py-2 text-sm font-medium text-white bg-red-600 hover:bg-red-700 rounded-md transition-colors w-full">삭제하기</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // 사용자 제공 Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyDVdpX3rKwN5aR7a7lyA2C1b2d5lRRZWKI",
            authDomain: "subak-map.firebaseapp.com",
            projectId: "subak-map",
            storageBucket: "subak-map.firebasestorage.app",
            messagingSenderId: "368910159844",
            appId: "1:368910159844:web:148b22d919b29048af81f1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mapDocRef = doc(db, "gyeongju", "globalData");

        // --- 클라우드 실시간 동기화 데이터 ---
        let favorites = [];
        let customLocations = [];
        let isFirstLoad = true;

        const syncDataToFirebase = async () => {
            try {
                await setDoc(mapDocRef, { favorites, customLocations });
            } catch(e) { console.error("Firebase 저장 실패:", e); }
        };

        const saveFavorites = () => syncDataToFirebase();
        const saveCustomLocations = () => syncDataToFirebase();

        // 365일 실시간으로 데이터를 불러오고 변경 사항을 수신하는 함수
        const loadInitialData = () => {
            return new Promise((resolve) => {
                onSnapshot(mapDocRef, async (docSnap) => {
                    const data = docSnap.exists() ? docSnap.data() : null;
                    
                    // --- 기존 로컬 데이터 방치 구출 작전 (마이그레이션) ---
                    if (!data && isFirstLoad) {
                        try {
                            const oldFavorites = JSON.parse(localStorage.getItem('gyeongju_favorites')) || [];
                            const oldCustoms = JSON.parse(localStorage.getItem('gyeongju_custom_locations')) || [];
                            
                            if (oldFavorites.length > 0 || oldCustoms.length > 0) {
                                console.log("기존 로컬 데이터 발견! 클라우드로 이전합니다.");
                                favorites = oldFavorites;
                                customLocations = oldCustoms;
                                
                                isFirstLoad = false;
                                await syncDataToFirebase();
                                resolve();
                                return; // setDoc을 하면 onSnapshot이 다시 트리거 되므로 여기서 리턴
                            }
                        } catch(e) {}
                    }

                    // --- 일반 데이터 로딩 ---
                    if (data) {
                        favorites = data.favorites || [];
                        customLocations = data.customLocations || [];
                    } else {
                        favorites = [];
                        customLocations = [];
                    }
                    
                    if (isFirstLoad) {
                        isFirstLoad = false;
                        resolve(); // 앱 구동 (초기 렌더링 시작)
                    } else {
                        // 다른 사람이 변경시 내 지도 화면 실시간 덮어쓰기! (렌더링 연쇄 호출)
                        rebuildMarkers(); 
                    }
                }, (error) => {
                    console.error("Firebase 실시간 동기화 오류:", error);
                    if (isFirstLoad) {
                        isFirstLoad = false;
                        resolve(); // 에러가 나더라도 앱은 켜져야 함
                    }
                });
            });
        };

        // 경주 중심 좌표 (대릉원 인근)
        const gyeongjuCenter = [35.8383, 129.2116];
        
        // 지도 초기화
        const map = L.map('map').setView(gyeongjuCenter, 13);

        // OpenStreetMap 타일 레이어 추가
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // 마커 색상 정의 (SVG 아이콘 활용)
        const createIcon = (color) => {
            return L.divIcon({
                className: 'custom-icon',
                html: `<svg width="30" height="42" viewBox="0 0 30 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 0C6.71573 0 0 6.71573 0 15C0 26.25 15 42 15 42C15 42 30 26.25 30 15C30 6.71573 23.2843 0 15 0Z" fill="${color}"/>
                        <circle cx="15" cy="15" r="7" fill="white"/>
                       </svg>`,
                iconSize: [30, 42],
                iconAnchor: [15, 42],
                popupAnchor: [0, -40]
            });
        };

        const icons = {
            tour: createIcon('#3B82F6'), // Blue
            food: createIcon('#EF4444'), // Red
            cafe: createIcon('#10B981'),  // Green
            transport: createIcon('#A855F7'), // Purple
            shop: createIcon('#F97316'), // Orange
            stay: createIcon('#06B6D4')  // Cyan
        };

        // 장소 데이터 리스트
        const locations = [
            // 교통
            { name: "경주역", searchName: "경주역 KTX", lat: 35.7976, lng: 129.1398, type: "transport", desc: "경주의 주요 관문. (구 신경주역)", address: "경북 경주시 건천읍 신경주역로 80", hours: "상시", closed: "연중무휴" },

            // 관광지
            { name: "불국사", searchName: "불국사", lat: 35.7899, lng: 129.3318, type: "tour", desc: "유네스코 세계문화유산. 필수 코스.", address: "경북 경주시 불국로 385", hours: "07:30 - 17:30", closed: "연중무휴" },

            { name: "어서어서", searchName: "경주 어서어서", lat: 35.8385, lng: 129.2097, type: "shop", desc: "약봉투 책 포장 독립 서점.", address: "경북 경주시 포석로 1083", hours: "11:00 - 19:30", closed: "연중무휴" },
            { name: "소소밀밀", searchName: "경주 소소밀밀", lat: 35.8378, lng: 129.2091, type: "shop", desc: "감성 그림책방.", address: "경북 경주시 포석로 1097", hours: "11:00 - 19:00", closed: "매주 화요일" },
            { name: "오홀리데이", searchName: "경주 오홀리데이", lat: 35.8381, lng: 129.2094, type: "shop", desc: "아기자기 소품 편집샵.", address: "경북 경주시 포석로 1089-14", hours: "11:00 - 20:00", closed: "연중무휴" },
            { name: "디스모먼트", searchName: "경주 디스모먼트", lat: 35.8380, lng: 129.2100, type: "shop", desc: "경주 자체 제작 기념품샵.", address: "경북 경주시 사정로 50-1", hours: "11:00 - 19:00", closed: "매주 목요일" },
            { name: "국립경주박물관 천년서고", searchName: "국립경주박물관 천년서고", lat: 35.8277, lng: 129.2274, type: "shop", desc: "국립경주박물관 내 위치한 감각적인 북라운지.", address: "경북 경주시 일정로 186", hours: "10:00 - 18:00", closed: "1월 1일, 명절 당일" }
        ];

        // 뱃지 색상 및 라벨 매핑 객체
        const badgeColors = {
            tour: 'bg-blue-100 text-blue-800',
            food: 'bg-red-100 text-red-800',
            cafe: 'bg-green-100 text-green-800',
            transport: 'bg-purple-100 text-purple-800',
            shop: 'bg-orange-100 text-orange-800',
            stay: 'bg-cyan-100 text-cyan-800'
        };
        const labels = { tour: '관광지', food: '맛집', cafe: '카페', transport: '교통', shop: '소품/서점', stay: '숙소' };

        // 마커 데이터를 관리할 배열
        const markersData = [];

        // 팝업 HTML 생성 함수
        const getPopupContent = (loc) => {
            const isFav = favorites.includes(loc.name);
            const searchQuery = encodeURIComponent(loc.searchName);
            const naverMapUrl = `https://map.naver.com/p/search/${searchQuery}?c=${loc.lng},${loc.lat},15,0,0,0,dh`;
            // 따옴표 및 특수문자로 인한 HTML 깨짐을 완벽히 방지하기 위해 URL 인코딩 적용
            const encodedName = encodeURIComponent(loc.name).replace(/'/g, "%27");

            // 직접 추가한 마커일 경우 삭제 버튼 UI 추가
            const deleteBtnHtml = loc.isCustom ? 
                `<button type="button" onclick="deleteCustomMarker(event, '${encodedName}')" class="w-full mt-2 text-xs font-medium text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 py-1.5 rounded transition-colors">이 장소 삭제하기 🗑️</button>` : '';

            return `
                <div class="w-full">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-xs font-semibold px-2 py-1 rounded-full ${badgeColors[loc.type]}">${labels[loc.type]}</span>
                        <button type="button" onclick="toggleFavorite(event, '${encodedName}')" class="text-2xl leading-none focus:outline-none transition-colors ${isFav ? 'text-yellow-400 hover:text-yellow-500' : 'text-gray-300 hover:text-yellow-400'}" title="즐겨찾기">
                            ${isFav ? '★' : '☆'}
                        </button>
                    </div>
                    <h3 class="text-lg font-bold mt-1 mb-1 text-gray-800">${loc.name}</h3>
                    <p class="text-sm text-gray-600 mb-2">${loc.desc}</p>
                    
                    <div class="space-y-1 text-xs text-gray-500 border-t pt-2 mb-3">
                        <div class="flex items-center gap-1.5">
                            <span class="font-bold shrink-0 text-gray-700">⏰ 정보:</span>
                            <span>${loc.hours || '-'}</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="font-bold shrink-0 text-gray-700">🗓️ 휴무:</span>
                            <span>${loc.closed || '-'}</span>
                        </div>
                    </div>

                    <div class="mt-2">
                        <a href="${naverMapUrl}" target="_blank" rel="noopener noreferrer" class="inline-block w-full text-center px-3 py-1.5 text-xs font-medium text-white bg-[#03C75A] rounded hover:bg-[#02b351] transition-colors shadow-sm">
                            네이버 지도에서 보기 ↗
                        </a>
                        ${deleteBtnHtml}
                    </div>
                </div>
            `;
        };

        // 삭제할 마커 이름을 임시 저장할 변수
        let markerToDelete = null;

        // 전역 스코프에 사용자 지정 장소 삭제 함수 노출 (모달 띄우기)
        window.deleteCustomMarker = (e, encodedName) => {
            if (e) {
                e.preventDefault();
                e.stopPropagation(); // 팝업창 뒤의 지도까지 클릭되는 현상 방지
            }
            markerToDelete = decodeURIComponent(encodedName);
            document.getElementById('delete-confirm-modal').classList.remove('hidden');
        };

        // 커스텀 삭제 모달 취소 버튼
        document.getElementById('btn-cancel-delete').addEventListener('click', () => {
            markerToDelete = null;
            document.getElementById('delete-confirm-modal').classList.add('hidden');
        });

        // 커스텀 삭제 모달 확인(삭제) 버튼
        document.getElementById('btn-confirm-delete').addEventListener('click', () => {
            if (!markerToDelete) return;
            const name = markerToDelete;
            
            map.closePopup(); // 팝업 깨짐 및 렌더링 충돌 방지를 위해 먼저 닫기
            
            setTimeout(() => {
                customLocations = customLocations.filter(loc => loc.name !== name);
                saveCustomLocations();
                
                if(favorites.includes(name)) {
                    favorites = favorites.filter(f => f !== name);
                    saveFavorites();
                }
                
                rebuildMarkers();
                
                markerToDelete = null;
                document.getElementById('delete-confirm-modal').classList.add('hidden');
            }, 50);
        });

        // 전역 스코프에 즐겨찾기 토글 함수 노출
        window.toggleFavorite = (e, encodedName) => {
            if (e) {
                e.preventDefault();
                e.stopPropagation();
            }
            const name = decodeURIComponent(encodedName);
            if (favorites.includes(name)) {
                favorites = favorites.filter(f => f !== name);
            } else {
                favorites.push(name);
            }
            saveFavorites();

            // 열려있는 팝업이나 지도 마커 콘텐츠 업데이트
            markersData.forEach(item => {
                if (item.loc.name === name) {
                    item.marker.setPopupContent(getPopupContent(item.loc));
                }
            });

            // 리스트 뷰 즉시 업데이트
            renderList();

            // 즐겨찾기 필터가 켜져있는 상태에서 해제했다면 지도 마커도 즉시 숨김 처리
            if (isFavoriteFilterActive) {
                updateFilters();
            }
        };

        // 마커 전체 초기화/재생성 함수 (기본 데이터 + 커스텀 데이터 지원)
        const rebuildMarkers = () => {
            // 기존 마커 지도에서 모두 제거
            markersData.forEach(item => {
                if (map.hasLayer(item.marker)) map.removeLayer(item.marker);
            });
            markersData.length = 0; // 배열 비우기

            // 기본 장소와 사용자가 직접 추가한 장소 병합
            const allLocations = [...locations, ...customLocations];

            // 지도에 마커 추가 및 팝업 설정
            allLocations.forEach(loc => {
                const marker = L.marker([loc.lat, loc.lng], { icon: icons[loc.type] });
                marker.bindPopup(getPopupContent(loc), { 
                    className: 'custom-popup',
                    closeButton: false, // x 버튼 삭제 적용
                    minWidth: 260,      // 초기 오픈 시 UI 깨짐 방지용 최소 너비 고정
                    maxWidth: 260       // 너비 고정
                });
                markersData.push({ marker: marker, type: loc.type, loc: loc });
            });

            // 필터 및 리스트 갱신
            updateFilters();
        };

        // --- 📍 마커 추가 이벤트 로직 ---
        let isAddMode = false;
        let pendingLatLng = null;

        const btnAddMarker = document.getElementById('btn-add-marker');
        const addToast = document.getElementById('add-toast');
        const addModal = document.getElementById('add-modal');
        const addForm = document.getElementById('add-form');
        const btnCancelAdd = document.getElementById('btn-cancel-add');
        const searchInput = document.getElementById('search-query');
        const btnSearchPlace = document.getElementById('btn-search-place');
        const searchResults = document.getElementById('search-results');
        const searchStatus = document.getElementById('search-status');
        const btnMapPick = document.getElementById('btn-map-pick');
        const mapPickStatus = document.getElementById('map-pick-status');
        const addAddressHidden = document.getElementById('add-address');

        // 장소 추가 버튼 클릭 시 바로 모달 띄우기 (흐름 변경)
        btnAddMarker.addEventListener('click', () => {
            addModal.classList.remove('hidden');
            
            // 만약 리스트 화면이라면 지도로 자동 전환시킴 (위치 확인 편의성)
            if(document.getElementById('map').classList.contains('hidden')){
                document.getElementById('btn-map').click();
            }

            // 초기화
            pendingLatLng = null;
            mapPickStatus.classList.remove('hidden');
            mapPickStatus.textContent = "(위치 미지정 - 지도 클릭 또는 검색 필수)";
            mapPickStatus.classList.replace('text-blue-600', 'text-red-500');
            searchInput.value = '';
            searchResults.innerHTML = '';
            searchStatus.classList.add('hidden');
        });

        // 지도에서 직접 선택하기 버튼 (모달 숨기고 맵 클릭 모드 진입)
        btnMapPick.addEventListener('click', () => {
            addModal.classList.add('hidden');
            isAddMode = true;
            addToast.classList.remove('hidden');
            map.getContainer().style.cursor = 'crosshair';
        });

        // 지도 클릭 이벤트 (직접 선택 모드일 때만 동작)
        map.on('click', function(e) {
            if(!isAddMode) return;
            
            pendingLatLng = e.latlng;
            isAddMode = false;
            addToast.classList.add('hidden');
            map.getContainer().style.cursor = '';
            
            // 위치 확정 후 텍스트/스타일 변경 및 폼 다시 띄우기
            mapPickStatus.textContent = "(위치 지정 완료 ✅)";
            mapPickStatus.classList.replace('text-red-500', 'text-blue-600');
            addAddressHidden.value = "지도에서 직접 선택한 위치"; // 주소 임시 저장 기본값
            
            addModal.classList.remove('hidden');
            setTimeout(() => document.getElementById('add-name').focus(), 100);
        });

        // 모달 닫기
        btnCancelAdd.addEventListener('click', () => {
            addModal.classList.add('hidden');
            addForm.reset();
            searchInput.value = '';
            searchResults.innerHTML = '';
            searchStatus.classList.add('hidden');
            pendingLatLng = null;
            
            // 혹시나 지도 픽 모드에서 취소한 경우도 리셋
            isAddMode = false;
            addToast.classList.add('hidden');
            map.getContainer().style.cursor = '';
        });

        // 지도 직접 선택 취소 버튼 (토스트 내장)
        const btnCancelMapPick = document.getElementById('btn-cancel-map-pick');
        if (btnCancelMapPick) {
            btnCancelMapPick.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                // 지도 클릭 모드 취소 후 모달로 원복
                isAddMode = false;
                addToast.classList.add('hidden');
                map.getContainer().style.cursor = '';
                addModal.classList.remove('hidden');
            });
        }

        // 검색 초기화 버튼 로직
        const btnResetSearch = document.getElementById('btn-reset-search');
        if (btnResetSearch) {
            btnResetSearch.addEventListener('click', () => {
                searchInput.value = '';
                searchResults.innerHTML = '';
                searchStatus.classList.add('hidden');
                document.getElementById('add-name').value = '';
                addAddressHidden.value = '직접 추가한 핀 위치';
                pendingLatLng = null;
                
                mapPickStatus.textContent = "(위치 미지정 - 지도 클릭 또는 검색 필수)";
                mapPickStatus.classList.replace('text-blue-600', 'text-red-500');
                mapPickStatus.classList.remove('hidden');
            });
        }

        // 장소 검색 모듈 (OpenStreetMap Nominatim API)
        btnSearchPlace.addEventListener('click', async () => {
            const query = searchInput.value.trim();
            if (!query) return;

            searchStatus.textContent = "검색 중...";
            searchStatus.className = "mt-2 text-xs text-blue-500 font-medium";
            searchResults.innerHTML = '';

            try {
                // 현재 지도가 보고 있는 화면 영역(Bounds) 가져오기
                const bounds = map.getBounds();
                const viewbox = `${bounds.getWest()},${bounds.getNorth()},${bounds.getEast()},${bounds.getSouth()}`;

                // 한국 지역(countrycodes=kr)에서 검색, limit는 5개, 현재 화면 중심(viewbox) 우선 검색(bounded=0)
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=jsonv2&addressdetails=1&countrycodes=kr&viewbox=${viewbox}&bounded=0&limit=5`;
                const response = await fetch(url, {
                    headers: { 'Accept-Language': 'ko-KR,ko;q=0.9' }
                });
                const data = await response.json();

                if (data.length === 0) {
                    searchStatus.textContent = "검색 결과가 없습니다. 도로명 주소나 상호명을 다시 확인해주세요.";
                    searchStatus.className = "mt-2 text-xs text-red-500 font-medium";
                } else {
                    searchStatus.classList.add('hidden');
                    data.forEach(item => {
                        const li = document.createElement('li');
                        li.className = "cursor-pointer p-2 hover:bg-gray-100 rounded border border-transparent hover:border-gray-200 transition-colors";
                        
                        // 상호명이 있으면 상호명 우선, 없으면 주소 중 가장 앞부분 사용
                        const displayName = item.name || item.display_name.split(',')[0];
                        const fullAddress = item.display_name;
                        
                        li.innerHTML = `
                            <div class="font-semibold text-gray-800">${displayName}</div>
                            <div class="text-xs text-gray-500 line-clamp-1">${fullAddress}</div>
                        `;
                        
                        li.addEventListener('click', () => {
                            // 항목 클릭 시 데이터 세팅
                            pendingLatLng = L.latLng(parseFloat(item.lat), parseFloat(item.lon));
                            document.getElementById('add-name').value = displayName;
                            addAddressHidden.value = fullAddress; // API에서 가져온 실제 주소 저장
                            
                            // UI 피드백 표시
                            mapPickStatus.textContent = `(검색 위치 선택됨: ${displayName} ✅)`;
                            mapPickStatus.classList.replace('text-red-500', 'text-blue-600');
                            mapPickStatus.classList.remove('hidden');
                            
                            // 검색 리스트 비우기
                            searchResults.innerHTML = '';
                        });
                        searchResults.appendChild(li);
                    });
                }
            } catch (err) {
                searchStatus.textContent = "검색 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
                searchStatus.className = "mt-2 text-xs text-red-500 font-medium";
                console.error(err);
            }
        });
        
        // 엔터키 리로드 방지 및 검색 연결
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                btnSearchPlace.click();
            }
        });

        // 폼 제출 (저장)
        addForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            if (!pendingLatLng) {
                alert("장소를 검색해서 결과를 선택하거나, 하단의 지도 아이콘을 눌러 위치를 지정해야 합니다!");
                return;
            }

            const nameVal = document.getElementById('add-name').value.trim();
            if(!nameVal) return;

            const newLoc = {
                name: nameVal,
                searchName: nameVal,
                lat: pendingLatLng.lat,
                lng: pendingLatLng.lng,
                type: document.getElementById('add-type').value,
                desc: document.getElementById('add-desc').value || '',
                address: addAddressHidden.value || "직접 추가한 핀 위치",
                hours: document.getElementById('add-hours').value || '-',
                closed: document.getElementById('add-closed').value || '-',
                isCustom: true // 커스텀 장소 식별값
            };

            customLocations.push(newLoc);
            saveCustomLocations(); // Firebase 연동 함수 트리거
            
            // 모달 및 변수 리셋
            addModal.classList.add('hidden');
            addForm.reset();
            searchInput.value = '';
            searchResults.innerHTML = '';
            searchStatus.classList.add('hidden');
            pendingLatLng = null;

            // 로컬 임시 UI 업데이트 (구 rebuildMarkers 호출 등은 onSnapshot이 자동으로 해줌)
            // Firebase가 저장 후 onSnapshot을 트리거하기 때문
            // 방금 추가한 마커로 부드럽게 이동
            map.flyTo([newLoc.lat, newLoc.lng], 15, { animate: true });
        });

        // --- 필터링 상태 관리 및 로직 ---
        const allTypes = ['tour', 'food', 'cafe', 'transport', 'shop', 'stay'];
        let activeTypes = [...allTypes]; // 디폴트는 전체 선택 상태
        let isFavoriteFilterActive = false; // 즐겨찾기 필터 상태

        // --- 정렬 상태 관리 ---
        let currentSortCol = null;
        let isSortAsc = true;

        const updateFilters = () => {
            // 버튼 UI 스타일 업데이트 (일반 유형 및 전체 버튼)
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const type = btn.dataset.type;
                const isAllBtn = type === 'all';
                const isActive = isAllBtn ? activeTypes.length === allTypes.length : activeTypes.includes(type);
                
                const activeBg = btn.dataset.activeBg;
                const activeBorder = btn.dataset.activeBorder;
                const activeText = btn.dataset.activeText;

                if (isActive) {
                    btn.classList.remove('bg-white', 'border-gray-200', 'text-gray-400', 'opacity-60');
                    btn.classList.add(activeBg, activeBorder, activeText, 'font-bold');
                } else {
                    btn.classList.remove(activeBg, activeBorder, activeText, 'font-bold');
                    btn.classList.add('bg-white', 'border-gray-200', 'text-gray-400', 'opacity-60');
                }
            });

            // 지도 마커 표시/숨김 처리 (유형 교집합 + 즐겨찾기 교집합)
            markersData.forEach(item => {
                const typeMatch = activeTypes.includes(item.type);
                const favMatch = isFavoriteFilterActive ? favorites.includes(item.loc.name) : true;

                if (typeMatch && favMatch) {
                    if (!map.hasLayer(item.marker)) map.addLayer(item.marker);
                } else {
                    if (map.hasLayer(item.marker)) map.removeLayer(item.marker);
                }
            });

            // 리스트 뷰 업데이트 실행
            renderList();
        };

        // 즐겨찾기 전용 필터 버튼 이벤트
        const btnFavFilter = document.getElementById('btn-favorite-filter');
        btnFavFilter.addEventListener('click', () => {
            isFavoriteFilterActive = !isFavoriteFilterActive;
            
            if (isFavoriteFilterActive) {
                btnFavFilter.classList.remove('bg-white', 'border-gray-200', 'text-gray-400', 'opacity-60');
                btnFavFilter.classList.add('bg-yellow-50', 'border-yellow-400', 'text-yellow-600', 'font-bold', 'opacity-100');
            } else {
                btnFavFilter.classList.remove('bg-yellow-50', 'border-yellow-400', 'text-yellow-600', 'font-bold', 'opacity-100');
                btnFavFilter.classList.add('bg-white', 'border-gray-200', 'text-gray-400', 'opacity-60');
            }
            updateFilters();
        });

        // 일반 유형 필터 버튼 클릭 이벤트 등록
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const type = e.currentTarget.dataset.type;
                
                if (type === 'all') {
                    if (activeTypes.length === allTypes.length) {
                        activeTypes = []; // 모두 해제
                    } else {
                        activeTypes = [...allTypes]; // 모두 선택
                    }
                } else {
                    if (activeTypes.includes(type)) {
                        activeTypes = activeTypes.filter(t => t !== type); // 선택 해제
                    } else {
                        activeTypes.push(type); // 개별 추가
                    }
                }
                updateFilters(); // 상태 변경 후 UI 동기화
            });
        });

        // --- 헤더 정렬 클릭 이벤트 등록 ---
        document.querySelectorAll('.sort-header').forEach(header => {
            header.addEventListener('click', () => {
                const sortKey = header.dataset.sort;
                
                if (currentSortCol === sortKey) {
                    isSortAsc = !isSortAsc; // 같은 컬럼 클릭 시 오름/내림차순 토글
                } else {
                    currentSortCol = sortKey;
                    isSortAsc = true; // 새로운 컬럼 클릭 시 기본 오름차순
                }

                // 모든 아이콘 초기화 후 현재 클릭된 컬럼에만 아이콘 표시
                document.querySelectorAll('.sort-icon').forEach(icon => icon.textContent = '');
                const iconSpan = header.querySelector('.sort-icon');
                iconSpan.textContent = isSortAsc ? '▲' : '▼';

                renderList(); // 정렬된 상태로 리스트 다시 렌더링
            });
        });

        // --- 리스트 화면 렌더링 함수 ---
        const renderList = () => {
            const tbody = document.getElementById('list-tbody');
            tbody.innerHTML = ''; // 초기화
            
            // 기본 장소와 사용자가 직접 추가한 장소 병합 데이터 사용
            const allLocations = [...locations, ...customLocations];

            // 1. 활성화된 필터 타입과 즐겨찾기 여부를 동시에 필터링
            let filteredLocations = allLocations.filter(loc => {
                const typeMatch = activeTypes.includes(loc.type);
                const favMatch = isFavoriteFilterActive ? favorites.includes(loc.name) : true;
                return typeMatch && favMatch;
            });
            
            // 2. 정렬 상태가 있다면 데이터 정렬 적용
            if (currentSortCol) {
                filteredLocations.sort((a, b) => {
                    let valA, valB;
                    
                    if (currentSortCol === 'type') {
                        // 구분은 뱃지 텍스트(한글) 기준으로 정렬
                        valA = labels[a.type];
                        valB = labels[b.type];
                    } else if (currentSortCol === 'name') {
                        valA = a.name;
                        valB = b.name;
                    } else if (currentSortCol === 'address') {
                        valA = a.address || '';
                        valB = b.address || '';
                    }

                    if (valA < valB) return isSortAsc ? -1 : 1;
                    if (valA > valB) return isSortAsc ? 1 : -1;
                    return 0;
                });
            }

            // 3. 필터 및 정렬이 완료된 데이터로 HTML 렌더링
            filteredLocations.forEach((loc, index) => {
                const searchQuery = encodeURIComponent(loc.searchName);
                const naverMapUrl = `https://map.naver.com/p/search/${searchQuery}?c=${loc.lng},${loc.lat},15,0,0,0,dh`;
                const isFav = favorites.includes(loc.name);
                // 따옴표 및 특수문자로 인한 HTML 깨짐 방지
                const encodedName = encodeURIComponent(loc.name).replace(/'/g, "%27");

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors";
                
                tr.innerHTML = `
                    <td class="whitespace-nowrap py-4 pl-4 pr-2 text-center sm:pl-6">
                        <button type="button" onclick="toggleFavorite(event, '${encodedName}')" class="text-xl leading-none focus:outline-none transition-colors ${isFav ? 'text-yellow-400 hover:text-yellow-500' : 'text-gray-300 hover:text-yellow-400'}">
                            ${isFav ? '★' : '☆'}
                        </button>
                    </td>
                    <td class="whitespace-nowrap px-2 py-4 text-sm font-medium text-gray-500">${index + 1}</td>
                    <td class="whitespace-nowrap px-3 py-4 text-sm">
                        <span class="inline-flex rounded-full px-2 py-1 text-xs font-semibold ${badgeColors[loc.type]}">${labels[loc.type]}</span>
                    </td>
                    <td class="px-3 py-4 text-sm font-bold text-gray-900 break-keep">${loc.name}</td>
                    <td class="px-3 py-4 text-sm text-gray-500 break-keep">${loc.address || '-'}</td>
                    <td class="px-3 py-4 text-sm text-gray-500 break-keep">${loc.hours || '-'}</td>
                    <td class="px-3 py-4 text-sm text-gray-500 break-keep">${loc.closed || '-'}</td>
                    <td class="whitespace-nowrap py-4 pl-3 pr-2 text-center text-sm font-medium">
                        <button type="button" onclick="navigateToMapWithLocation('${encodedName}')" class="inline-flex items-center px-2.5 py-1.5 border border-transparent text-xs font-medium rounded text-white bg-blue-500 hover:bg-blue-600 shadow-sm cursor-pointer">
                            📍 보기
                        </button>
                    </td>
                    <td class="whitespace-nowrap py-4 pl-2 pr-4 text-center text-sm font-medium sm:pr-6">
                        <a href="${naverMapUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center px-2.5 py-1.5 border border-transparent text-xs font-medium rounded text-white bg-[#03C75A] hover:bg-[#02b351] shadow-sm">
                            지도 ↗
                        </a>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        };

        // 초기화 시 전체 렌더링 시작
        const init = async () => {
            await loadInitialData();
            rebuildMarkers(); // updateFilters, renderList를 연쇄 호출함
        };
        init();

        // --- 리스트에서 지도로 이동하는 글로벌 함수 ---
        window.navigateToMapWithLocation = (encodedName) => {
            const name = decodeURIComponent(encodedName);
            const allLocations = [...locations, ...customLocations];
            const targetLoc = allLocations.find(loc => loc.name === name);
            if (!targetLoc) return;

            // 지도 뷰로 전환
            const mapView = document.getElementById('map');
            const listView = document.getElementById('list-view');
            const btnMap = document.getElementById('btn-map');
            const btnList = document.getElementById('btn-list');

            mapView.classList.remove('hidden');
            listView.classList.add('hidden');

            btnMap.classList.add('bg-white', 'shadow-sm', 'font-bold', 'text-gray-800');
            btnMap.classList.remove('text-gray-500', 'font-medium', 'hover:text-gray-800');
            btnList.classList.add('text-gray-500', 'font-medium', 'hover:text-gray-800');
            btnList.classList.remove('bg-white', 'shadow-sm', 'font-bold', 'text-gray-800');

            // 지도 사이즈 재계산 후 해당 위치로 이동 및 팝업 열기
            setTimeout(() => {
                map.invalidateSize();
                map.flyTo([targetLoc.lat, targetLoc.lng], 17, { animate: true, duration: 1.0 });

                setTimeout(() => {
                    const targetMarkerData = markersData.find(m => m.loc.name === name);
                    if (targetMarkerData) {
                        // 마커가 필터에 의해 숨겨져 있으면 지도에 추가
                        if (!map.hasLayer(targetMarkerData.marker)) {
                            map.addLayer(targetMarkerData.marker);
                        }
                        targetMarkerData.marker.openPopup();
                    }
                }, 800);
            }, 100);
        };

        // --- 토글 버튼 로직 ---
        const btnMap = document.getElementById('btn-map');
        const btnList = document.getElementById('btn-list');
        const mapView = document.getElementById('map');
        const listView = document.getElementById('list-view');

        btnMap.addEventListener('click', () => {
            mapView.classList.remove('hidden');
            listView.classList.add('hidden');
            
            btnMap.classList.add('bg-white', 'shadow-sm', 'font-bold', 'text-gray-800');
            btnMap.classList.remove('text-gray-500', 'font-medium', 'hover:text-gray-800');
            
            btnList.classList.add('text-gray-500', 'font-medium', 'hover:text-gray-800');
            btnList.classList.remove('bg-white', 'shadow-sm', 'font-bold', 'text-gray-800');
            
            setTimeout(() => { map.invalidateSize(); }, 50);
        });

        btnList.addEventListener('click', () => {
            listView.classList.remove('hidden');
            mapView.classList.add('hidden');
            
            btnList.classList.add('bg-white', 'shadow-sm', 'font-bold', 'text-gray-800');
            btnList.classList.remove('text-gray-500', 'font-medium', 'hover:text-gray-800');
            
            btnMap.classList.add('text-gray-500', 'font-medium', 'hover:text-gray-800');
            btnMap.classList.remove('bg-white', 'shadow-sm', 'font-bold', 'text-gray-800');
        });

        // 브라우저 리사이즈 시 지도 크기 동기화
        window.addEventListener('resize', () => {
            map.invalidateSize();
        });

        // 초기 줌 설정
        setTimeout(() => {
            map.invalidateSize();
            const mapSize = map.getSize();
            
            if (mapSize.x > 0 && mapSize.y > 0) {
                const group = new L.featureGroup(locations.map(loc => L.marker([loc.lat, loc.lng])));
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }, 800);

    </script>
</body>
</html>
